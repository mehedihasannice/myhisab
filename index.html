<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFFFFF" id="theme-color-meta">
<title>Myhisab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>

<div class="brand">Myhisab</div>
<div class="tagline">কথায় কথায় হিসাব</div>

<!-- অবস্থা ১: login/signup -->
<div id="auth-section" class="card">
  <form id="login-form">
    <label for="login-email">Email</label>
    <input type="email" id="login-email" autocomplete="email" required>
    <label for="login-password">Password</label>
    <input type="password" id="login-password" autocomplete="current-password" required>
    <div class="error-msg" id="login-error"></div>
    <button type="submit" class="btn-primary">লগইন করো</button>
    <button type="button" class="link-btn" id="show-signup-btn">নতুন? অ্যাকাউন্ট তৈরি করো</button>
  </form>

  <form id="signup-form" class="hidden">
    <label for="signup-name">তোমার নাম</label>
    <input type="text" id="signup-name" autocomplete="name" required>
    <label for="signup-email">Email</label>
    <input type="email" id="signup-email" autocomplete="email" required>
    <label for="signup-password">Password</label>
    <input type="password" id="signup-password" autocomplete="new-password" required minlength="6">
    <div class="hint">কমপক্ষে ৬ character</div>
    <div class="error-msg" id="signup-error"></div>
    <button type="submit" class="btn-primary">অ্যাকাউন্ট তৈরি করো</button>
    <button type="button" class="link-btn" id="show-login-btn">আগে থেকে account আছে? লগইন করো</button>
  </form>
</div>

<!-- অবস্থা ২: login হয়েছে কিন্তু admin approve করেনি -->
<div id="pending-section" class="card hidden">
  <div class="pending-icon">⏳</div>
  <p class="pending-text">Account তৈরি হয়ে গেছে।<br>এখন admin approve করলেই ভেতরে ঢুকতে পারবে।</p>
  <button class="logout-btn" id="pending-logout-btn">লগআউট</button>
</div>

<!-- অবস্থা ৩: provisioned, main app shell -->
<div id="app-section" class="app-wrap hidden">
  <div class="app-header">
    <div>
      <span class="who" id="who-name"></span>
      <span class="role-badge" id="who-role"></span>
    </div>
    <button class="logout-btn" id="app-logout-btn">লগআউট</button>
  </div>

  <div class="admin-panel hidden" id="admin-panel">
    <div class="admin-panel-title">Pending Approvals</div>
    <div id="pending-list"></div>
  </div>

  <div class="segmented-toggle" id="ledger-toggle">
    <div class="segment-indicator" id="segment-indicator"></div>
    <button type="button" class="segment active" id="tab-personal">Personal</button>
    <button type="button" class="segment" id="tab-business">Business</button>
  </div>

  <div class="chat-feed" id="chat-feed"></div>

  <form id="chat-form" class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="যেমন: ৫০ টাকার চা খেয়েছি" autocomplete="off" required>
    <button type="submit" class="send-btn" id="chat-send-btn" aria-label="Send">➤</button>
  </form>

  <div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-card">
      <div class="confirm-title">যাচাই করো</div>
      <label for="confirm-amount">Amount (৳)</label>
      <input type="number" id="confirm-amount" min="0" step="0.01">
      <label>Type</label>
      <div class="confirm-type-toggle">
        <button type="button" class="type-btn type-expense active" id="confirm-type-expense">Expense</button>
        <button type="button" class="type-btn type-income" id="confirm-type-income">Income</button>
      </div>
      <label for="confirm-category">Category</label>
      <input type="text" id="confirm-category">
      <label for="confirm-date">Date</label>
      <input type="date" id="confirm-date">
      <label for="confirm-note">Note</label>
      <input type="text" id="confirm-note">
      <div class="confirm-actions">
        <button type="button" class="btn-secondary" id="confirm-cancel-btn">বাতিল</button>
        <button type="button" class="btn-primary" id="confirm-save-btn">সংরক্ষণ করো</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
