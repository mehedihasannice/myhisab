<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myhisab — Complete Pipeline Test</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; margin: auto; max-width: 500px; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2d2d2d; }
        h2 { color: #00FFFF; margin-top: 0; border-bottom: 2px solid #2d2d2d; padding-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; border-radius: 6px; color: #fff; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #00FFFF; outline: none; }
        button { background: linear-gradient(135deg, #00FFFF, #008b8b); color: #121212; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        button:hover { opacity: 0.9; }
        pre { background: #000; border: 1px solid #333; font-family: monospace; padding: 15px; border-radius: 6px; max-height: 350px; overflow-y: auto; white-space: pre-wrap; color: #00ff00; margin-top: 20px; word-break: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ Myhisab Pipeline Tester</h2>
    
    <div id="setup-box">
        <div class="form-group">
            <label>1. Cloudflare Worker URL:</label>
            <input type="text" id="workerUrl" value="https://accounting-bot-parser.mehedihasan-nice96.workers.dev">
        </div>

        <div class="form-group">
            <label>2. Firebase Web API Key:</label>
            <input type="text" id="apiKey" placeholder="Firebase Console থেকে পাওয়া Web API Key বসান">
        </div>

        <div class="form-group">
            <label>3. Admin Login (Email & Password):</label>
            <input type="email" id="email" placeholder="ফায়ারবেসে তৈরি করা টেস্ট ইমেইল" style="margin-bottom: 8px;">
            <input type="password" id="password" placeholder="পাসওয়ার্ড">
        </div>
        
        <button id="login-btn">🔐 প্রথমে লগইন ও কানেক্ট করুন</button>
    </div>

    <div id="test-box" style="display:none">
        <p id="who" style="color: #00ff00; font-weight: bold; text-align: center;"></p>
        <div class="form-group">
            <label>4. Test Message for Gemini AI:</label>
            <textarea id="sentence" rows="2">আজকে বাজারে খরচ ৫০০ টাকা।</textarea>
        </div>
        <button id="test-btn">🚀 Run Full Pipeline Test</button>
    </div>

    <pre id="result">টেস্ট রান করার জন্য উপরের তথ্যগুলো দিয়ে বাটনে চাপুন...</pre>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';

  let auth;

  function log(msg) {
      const resultEl = document.getElementById('result');
      if(resultEl.textContent === 'টেস্ট রান করার জন্য উপরের তথ্যগুলো দিয়ে বাটনে চাপুন...') {
          resultEl.textContent = '';
      }
      const time = `[${new Date().toLocaleTimeString()}] `;
      resultEl.textContent += time + msg + '\n';
      resultEl.scrollTop = resultEl.scrollHeight;
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const workerUrl = document.getElementById('workerUrl').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const resultEl = document.getElementById('result');

    if(!workerUrl || !apiKey || !email || !password) {
        alert('দয়া করে সবগুলো ঘর ঠিকঠাক পূরণ করুন!');
        return;
    }

    resultEl.textContent = '';
    log('ধাপ ১: ফায়ারবেস ইনিশিয়ালাইজ করা হচ্ছে...');

    // স্ক্রিনশট থেকে স্বয়ংক্রিয়ভাবে প্রজেক্ট আইডি ও ডাটাবেজ ইউআরএল বসানো হয়েছে
    const firebaseConfig = {
      apiKey: apiKey,
      authDomain: "my-hisab-d6f6d.firebaseapp.com",
      databaseURL: "https://my-hisab-d6f6d-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "my-hisab-d6f6d"
    };

    try {
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      log('✅ ফায়ারবেস কানেক্টেড।');
      
      log('ধাপ ২: ইউজারের লগইন প্রসেস শুরু হচ্ছে...');
      const cred = await signInWithEmailAndPassword(auth, email, password);
      log(`✅ লগইন সফল! ইউজার: ${cred.user.email}`);

      document.getElementById('setup-box').style.display = 'none';
      document.getElementById('test-box').style.display = 'block';
      document.getElementById('who').textContent = 'লগইন অ্যাকাউন্ট: ' + cred.user.email;
      log('👍 এখন নিচের টেক্সটটি লিখে পাইপলাইন টেস্ট বাটনে চাপুন।');
    } catch (err) {
      log('❌ ব্যর্থ: ' + err.message);
    }
  });

  document.getElementById('test-btn').addEventListener('click', async () => {
    const text = document.getElementById('sentence').value;
    const workerUrl = document.getElementById('workerUrl').value.trim();
    
    log('ধাপ ৩: সিক্রেট Auth ID Token জেনারেট করা হচ্ছে...');
    try {
      const idToken = await auth.currentUser.getIdToken(true);
      log('✅ আইডি টোকেন তৈরি সম্পন্ন।');

      log('ধাপ ৪: ক্লাউডফ্লেয়ার ওয়ার্কারে ডেটা পাঠানো হচ্ছে...');
      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken
        },
        body: JSON.stringify({ text }) // ক্লডের ব্যাকএন্ডের রিকোয়ারমেন্ট অনুযায়ী { text } পাঠানো হচ্ছে
      });
      
      log(`যোগাযোগের রেসপন্স কোড: ${res.status}`);
      const data = await res.json();
      
      if (res.ok) {
        log('🎉 অভিনন্দন ভাই! পুরো পাইপলাইন পারফেক্টলি কাজ করছে!');
        log('🤖 জেমিনি থেকে আসা রেসপন্স:\n' + JSON.stringify(data, null, 2));
      } else {
        log('❌ ওয়ার্কার রেসপন্স দিয়েছে কিন্তু ভেতরে সমস্যা: ' + (data.error || JSON.stringify(data)));
      }
    } catch (err) {
      log('❌ ক্লাউডফ্লেয়ার ওয়ার্কারের সাথে যোগাযোগ ব্যর্থ (CORS বা নেটওয়ার্ক এরর): ' + err.message);
    }
  });
</script>
</body>
</html>
